<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon / Logo -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>JP Quintana | Automation & Full Stack Developer Portfolio</title>
    <meta
      name="description"
      content="Portfolio of JP Quintana — Automation Developer & Full Stack Engineer specializing in React, TypeScript, Playwright, and system automation."
    />
    <meta
      name="keywords"
      content="JP Quintana, Automation Developer, Full Stack Developer, React, TypeScript, Playwright, Portfolio, Web Developer Philippines"
    />
    <meta name="author" content="JP Quintana" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL (change when deployed) -->
    <link rel="canonical" href="https://jpquintana-dev-portfolio.netlify.app/" />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="JP Quintana | Automation & Full Stack Developer" />
    <meta
      property="og:description"
      content="Automation Developer & Full Stack Engineer building scalable systems, automation tools, and modern web apps."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://jpquintana-dev-portfolio.netlify.app/" />
    <meta property="og:site_name" content="JP Quintana Portfolio" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="JP Quintana | Developer Portfolio" />
    <meta
      name="twitter:description"
      content="Automation & Full Stack Developer specializing in React, TypeScript, and Playwright automation."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Theme Color (mobile UI branding) -->
    <meta name="theme-color" content="#0f172a" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
